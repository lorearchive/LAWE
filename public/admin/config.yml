backend:
  name: github
  repo: lorearchive/law-content
  branch: main
  base_url: https://lawe-pearl.vercel.app
  auth_endpoint: oauth
media_folder: "images"
public_folder: "/images"

collections:
  - name: wiki
    label: The Lore Archives
    folder: "wiki"
    format: "frontmatter"
    create: true
    extension: "txt"
    identifier_field: "title"
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: body, label: Body, widget: text }
