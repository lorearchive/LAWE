backend:
  name: github
  repo: lorearchive/LAWE
  branch: main
  site_domain: lorearchive.org
  base_url: https://lorearchive.org
  auth_endpoint: oauth
media_folder: "images"
public_folder: "/images"

collections:
  - name: wiki
    label: The Lore Archives
    folder: content/wiki
    create: true
    extension: txt
    fields:
      - { name: title, label: Title }
      - { name: body, label: Body, widget: richtext }
